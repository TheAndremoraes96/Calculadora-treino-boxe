<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>BoxTimer Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 20px;
      transition: 0.3s;
    }

    .card {
      background: #f2f2f2;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    input, select {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }

    #timer {
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🥊 BoxTimer Pro</h1>

<!-- IMC -->
<div class="card">
  <h2>📊 IMC</h2>

  <input id="peso" placeholder="Peso (kg)">
  <input id="altura" placeholder="Altura (ex: 1.75)">

  <select id="objetivo">
    <option value="hipertrofia">Hipertrofia</option>
    <option value="emagrecimento">Emagrecimento</option>
    <option value="manutencao">Manutenção</option>
  </select>

  <button onclick="calcular()">Calcular</button>

  <p id="resultado"></p>
</div>

<!-- DIETA -->
<div class="card">
  <h2>🍽️ Dieta</h2>
  <p id="dieta"></p>
</div>

<!-- TIMER -->
<div class="card">
  <h2>🥊 Timer de Round</h2>

  <div id="timer">00:00</div>

  <button onclick="startRound()">Iniciar Round (2 min)</button>
  <button onclick="resetTimer()">Reset</button>
</div>

<!-- HISTÓRICO -->
<div class="card">
  <h2>📈 Histórico</h2>
  <canvas id="grafico"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
