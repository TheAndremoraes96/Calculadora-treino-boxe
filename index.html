<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoxTimer Pro Community</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <header>
    <h1>🥊 BoxTimer Pro Community</h1>
    <p>Treine. Evolua. Compartilhe.</p>
  </header>

  <nav class="menu">
    <a href="#perfil">Perfil</a>
    <a href="#atividade">Atividade</a>
    <a href="#feed">Feed</a>
    <a href="#dashboard">Dashboard</a>
    <a href="#eventos">Eventos</a>
  </nav>

  <section class="card" id="perfil">
    <h2>🏆 Perfil do Atleta</h2>

    <input id="perfilNome" placeholder="Nome do atleta">
    <input id="perfilCidade" placeholder="Cidade">
    <input id="perfilIdade" type="number" placeholder="Idade">
    <input id="perfilPeso" type="number" placeholder="Peso atual em kg">

    <select id="perfilModalidade">
      <option value="">Modalidade principal</option>
      <option>Boxe</option>
      <option>Corrida</option>
      <option>Caminhada</option>
      <option>Musculação</option>
      <option>HIIT</option>
      <option>Natação</option>
      <option>Cross Training</option>
    </select>

    <select id="perfilObjetivo">
      <option value="">Objetivo</option>
      <option>Emagrecimento</option>
      <option>Hipertrofia</option>
      <option>Performance</option>
      <option>Condicionamento</option>
      <option>Competição</option>
    </select>

    <textarea id="perfilBio" placeholder="Histórico esportivo, conquistas ou descrição pessoal"></textarea>

    <button onclick="salvarPerfil()">Salvar Perfil</button>

    <div id="perfilSalvo"></div>
  </section>

  <section class="card" id="atividade">
    <h2>📈 Registrar Atividade</h2>

    <input id="atividadeNome" placeholder="Nome do atleta">

    <select id="tipoAtividade">
      <option value="">Tipo de atividade</option>
      <option>Boxe</option>
      <option>Sparring</option>
      <option>Corrida</option>
      <option>Caminhada</option>
      <option>Musculação</option>
      <option>HIIT</option>
      <option>Natação</option>
      <option>Cross Training</option>
    </select>

    <input id="distancia" type="number" step="0.1" placeholder="Distância em km, se houver">
    <input id="tempo" type="number" placeholder="Tempo em minutos">
    <input id="calorias" type="number" placeholder="Calorias estimadas">

    <input id="rounds" type="number" placeholder="Rounds, se for boxe">
    <input id="golpes" type="number" placeholder="Golpes estimados, se for boxe">
    <input id="carga" placeholder="Carga/séries/repetições, se for musculação">

    <textarea id="comentarioAtividade" placeholder="Como foi o treino? Observações técnicas, evolução ou sensação do dia"></textarea>

    <input type="file" id="fotoAtividade" accept="image/*">

    <button onclick="publicarAtividade()">Publicar Atividade</button>
  </section>

  <section class="card" id="feed">
    <h2>🌍 Feed da Comunidade</h2>
    <div id="feedAtividades"></div>
  </section>

  <section class="card" id="dashboard">
    <h2>📊 Dashboard de Evolução</h2>

    <div class="dashboard-grid">
      <div class="stat">
        <h3 id="totalTreinos">0</h3>
        <p>Treinos</p>
      </div>

      <div class="stat">
        <h3 id="totalHoras">0h</h3>
        <p>Horas treinadas</p>
      </div>

      <div class="stat">
        <h3 id="totalKm">0 km</h3>
        <p>Distância</p>
      </div>

      <div class="stat">
        <h3 id="totalRounds">0</h3>
        <p>Rounds</p>
      </div>
    </div>

    <h3>🏅 Conquistas</h3>
    <div id="conquistas"></div>
  </section>

  <section class="card" id="eventos">
    <h2>📅 Eventos Esportivos</h2>

    <input id="eventoOrganizador" placeholder="Organizador">
    
    <select id="eventoTipo">
      <option value="">Tipo de evento</option>
      <option>Corrida</option>
      <option>Caminhada</option>
      <option>Natação</option>
      <option>HIIT</option>
      <option>Boxe</option>
      <option>Treino coletivo</option>
      <option>Sparring</option>
    </select>

    <input id="eventoData" type="date">
    <input id="eventoHora" type="time">
    <input id="eventoLocal" placeholder="Local">
    <input id="eventoMax" type="number" placeholder="Número máximo de participantes">
    <textarea id="eventoDescricao" placeholder="Descrição do evento"></textarea>

    <button onclick="criarEvento()">Criar Evento</button>

    <div id="listaEventos"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
