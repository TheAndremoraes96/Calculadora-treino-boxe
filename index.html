<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥊 BoxTimer Pro</title>

    <link rel="stylesheet" href="style.css">

    <!-- 📱 PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff2d2d">

    <!-- ☁️ FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
</head>

<body id="appBody">

    <h1>🥊 BoxTimer Pro</h1>

    <!-- ================= IMC ================= -->
    <h2>IMC + Plano do Atleta</h2>

    <input type="number" id="peso" placeholder="Peso (kg)">
    <input type="number" id="altura" placeholder="Altura (m)" step="0.01">

    <br><br>

    <select id="objetivo">
        <option value="hipertrofia">Hipertrofia</option>
        <option value="emagrecimento">Emagrecimento</option>
        <option value="manutencao">Manutenção</option>
    </select>

    <select id="preferencia">
        <option value="carnivoro">Carnívoro</option>
        <option value="pescetariano">Pescetariano</option>
        <option value="fit">Fit leve</option>
    </select>

    <select id="orcamento">
        <option value="economico">Econômico</option>
        <option value="padrao">Padrão</option>
    </select>

    <br><br>

    <button onclick="calcularIMC()">Calcular IMC</button>

    <h2 id="resultado"></h2>
    <pre id="dieta"></pre>

    <hr>

    <!-- 📊 GRÁFICO -->
    <h2>📊 Evolução do IMC</h2>
    <div id="grafico-imc"></div>

    <hr>

    <!-- 📈 HISTÓRICO -->
    <h2>📈 Histórico</h2>
    <div id="historico"></div>

    <button onclick="limparHistorico()">Limpar Histórico</button>

    <hr>

    <!-- 🥊 TIMER -->
    <h2>🥊 BoxTimer Pro</h2>

    <h3 id="round">ROUND 1 / 12</h3>
    <h3 id="status">🥊 LUTA</h3>

    <div id="timer">03:00</div>

    <button onclick="iniciarTimer()">Iniciar</button>
    <button onclick="pararTimer()">Parar</button>
    <button onclick="reiniciarTimer()">Reiniciar</button>

    <script src="script.js"></script>
</body>

</html>
