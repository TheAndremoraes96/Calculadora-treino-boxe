<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Treino de Boxe</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🥊 Calculadora de Treino de Boxe</h1>

    <label>Peso (kg):</label>
    <br>
    <input type="number" id="peso">
    <br><br>

    <label>Altura (m):</label>
    <br>
    <input type="number" id="altura" step="0.01">
    <br><br>

   <button onclick="iniciarTimer()">
    Iniciar
</button>

<button onclick="pararTimer()">
    Parar
</button>

<button onclick="reiniciarTimer()">
    Reiniciar
</button>

    <h2 id="resultado"></h2>
<h2>🥊 Cronômetro de Round</h2>

<div id="timer">03:00</div>

<button onclick="iniciarTimer()">
    Iniciar
</button>
    <script src="script.js"></script>

</body>

</html>
