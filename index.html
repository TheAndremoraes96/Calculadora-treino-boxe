<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥊 BoxTimer Pro</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🥊 BoxTimer Pro</h1>

    <h2>IMC do Atleta</h2>

    <label>Peso (kg):</label>
    <br>
    <input type="number" id="peso">
    <br><br>

    <label>Altura (m):</label>
    <br>
    <input type="number" id="altura" step="0.01">
    <br><br>

    <button onclick="calcularIMC()">
        Calcular IMC
    </button>

    <h2 id="resultado"></h2>

    <hr>

    <h2>🥊 Cronômetro de Treino</h2>

    <h3 id="round">🔥 ROUND 1 / 12 🔥</h3>

    <h3 id="status">🥊 LUTA</h3>

    <div id="timer">03:00</div>

    <button onclick="iniciarTimer()">
        Iniciar
    </button>

    <button onclick="pararTimer()">
        Parar
    </button>

    <button onclick="reiniciarTimer()">
        Reiniciar Treino
    </button>

    <script src="script.js"></script>

</body>

</html>
